name: System Audit

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  frontend-verify:
    name: Frontend verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend verify
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: node scripts/system-audit.mjs --skip-backend --skip-supabase

  ai-backend-smoke:
    name: AI backend smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install AI backend dependencies
        run: python -m pip install --upgrade pip && pip install -r ai-backend/requirements.txt

      - name: Run AI backend smoke tests
        run: node scripts/system-audit.mjs --skip-frontend --skip-supabase

  supabase-audit:
    name: Supabase audit files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Supabase audit assets
        run: node scripts/system-audit.mjs --skip-frontend --skip-backend
