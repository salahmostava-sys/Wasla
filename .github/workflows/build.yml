name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npm run typecheck

      - name: Lint (strict – zero warnings)
        working-directory: frontend
        run: npm run lint:strict

      - name: Tests
        working-directory: frontend
        run: npm run test:coverage

      - name: Fix coverage paths for SonarCloud
        run: sed -i 's/SF:/SF:frontend\//g' frontend/coverage/lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/
          retention-days: 1

      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./frontend/coverage
          fail_ci_if_error: false

      - name: Build
        working-directory: frontend
        run: npm run build

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    continue-on-error: true
    steps:
      - name: Checkout repository
        if: env.SONAR_TOKEN != ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        if: env.SONAR_TOKEN != ''
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@c9d327c0246c0bbfe955144aa8a5e033bf766f52 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
