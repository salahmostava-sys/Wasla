sonar.projectKey=salahmostava-sys_MuhimmatAltawseel
sonar.organization=salahmostava-sys

# Scan all meaningful source directories
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.sources=\
  frontend/services,\
  frontend/app,\
  frontend/modules,\
  frontend/shared/lib,\
  frontend/shared/hooks,\
  frontend/shared/components,\
  server/lib,\
  server/index.js,\
  api,\
  ai-backend

sonar.sourceEncoding=UTF-8
sonar.python.version=3.11

sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.test.*,\
  **/*.spec.*,\
  **/*.css,\
  **/*.json,\
  **/types.ts,\
  **/e2e/**,\
  **/mocks/**,\
  **/__fixtures__/**,\
  **/supabase/migrations/**/*,\
  **/scripts/**/*

# Ignore S1192 in SQL files (plsql and tsql)
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=plsql:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.sql
sonar.issue.ignore.multicriteria.e2.ruleKey=tsql:S1192
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.sql

# Set python version to resolve SonarCloud warning
sonar.python.version=3.10

# SQL migration files are excluded from copy-paste detection.
# Each migration intentionally re-declares the full function body
# with incremental changes — duplication here is structural, not a defect.
sonar.cpd.exclusions=\
  **/supabase/migrations/**/*,\
  **/*.sql

sonar.qualitygate.wait=false
