# sonar-project.properties
sonar.projectKey=MuhimmatAltawseel
sonar.organization=salahmostava-sys
sonar.projectName=MuhimmatAltawseel
sonar.projectVersion=1.0
sonar.sources=frontend/app,frontend/modules,frontend/services,frontend/shared,server,ai-backend
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/*.{test,spec}.{js,jsx,ts,tsx},scratch/**,supabase/migrations/**,supabase/oneoff/**,supabase/manual_sync.sql,public/assets/**,frontend/services/supabase/types.ts
sonar.tests=frontend/app,frontend/modules,frontend/services,frontend/shared
sonar.test.inclusions=**/*.{test,spec}.{js,jsx,ts,tsx}
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.language=ts,js,py,sql
sonar.plsql.file.suffixes=.sql

# NOTE: supabase/migrations, supabase/oneoff, and supabase/manual_sync.sql are
# intentionally excluded (see sonar.exclusions above) rather than relying on
# sonar.cpd.exclusions. Historical migration files (and manual_sync.sql, which is
# literally a concatenation of migrations) are near-duplicates by nature
# (incremental fixes re-applying similar CREATE OR REPLACE FUNCTION/RLS
# statements) and should never be refactored for "duplication", but
# sonar.cpd.exclusions was not being honored for the PL/SQL analyzer, which
# caused ~91% of "new code" duplication (and the Quality Gate failure on
# new_duplicated_lines_density) to come from files that were never meant to be
# graded. Fully excluding these paths from analysis resolves this reliably.
#
# public/assets/** contains built/minified JS bundles committed as static
# assets (not source code) — they should never be linted or graded.
#
# frontend/services/supabase/types.ts is machine-generated by
# `supabase gen types` and should not be linted as hand-written source.

# Ignore String Duplication (S1192) in any remaining SQL files
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=*:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.sql

# Exclude SQL files and scratch directory from Copy-Paste Detection (kept as a
# secondary safety net; see note above)
sonar.cpd.exclusions=**/*.sql,scratch/**
