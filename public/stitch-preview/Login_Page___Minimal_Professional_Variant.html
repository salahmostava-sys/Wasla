<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - ChronosHR</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined', sans-serif;
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        .input-focus-ring:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#653e00",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#00714d",
                        "secondary-fixed-dim": "#4edea3",
                        "outline-variant": "#c7c4d8",
                        "on-primary-container": "#dad7ff",
                        "on-surface-variant": "#464555",
                        "inverse-primary": "#c3c0ff",
                        "surface-container-low": "#eff4ff",
                        "primary-fixed-dim": "#c3c0ff",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#ffd4a4",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#dce9ff",
                        "tertiary": "#684000",
                        "on-secondary-fixed-variant": "#005236",
                        "surface-container-highest": "#d5e3fc",
                        "primary-fixed": "#e2dfff",
                        "on-surface": "#0d1c2e",
                        "background": "#f8f9ff",
                        "surface-tint": "#4d44e3",
                        "on-tertiary-fixed": "#2a1700",
                        "tertiary-container": "#885500",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#ffddb8",
                        "secondary-container": "#6cf8bb",
                        "outline": "#777587",
                        "inverse-surface": "#233144",
                        "surface": "#f8f9ff",
                        "on-primary-fixed": "#0f0069",
                        "on-secondary-fixed": "#002113",
                        "tertiary-fixed-dim": "#ffb95f",
                        "primary-container": "#4f46e5",
                        "on-error": "#ffffff",
                        "on-primary-fixed-variant": "#3323cc",
                        "primary": "#4f46e5", /* Updated to brand primary */
                        "inverse-on-surface": "#eaf1ff",
                        "surface-variant": "#d5e3fc",
                        "surface-dim": "#ccdbf3",
                        "secondary-fixed": "#6ffbbe",
                        "surface-container": "#e6eeff",
                        "surface-bright": "#f8f9ff",
                        "on-background": "#0d1c2e",
                        "secondary": "#006c49",
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.375rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "32px",
                        "margin-mobile": "20px",
                        "container-max-width": "1440px",
                        "margin-desktop": "48px",
                        "unit": "6px",
                        "gutter": "24px",
                        "stack-sm": "12px",
                        "stack-md": "20px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "title-md": ["Hanken Grotesk"],
                        "label-md": ["JetBrains Mono"],
                        "label-caps": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "body-sm": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "title-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-md": ["13px", { "lineHeight": "18px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.06em", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "26px", "fontWeight": "400" }],
                        "display-lg": ["52px", { "lineHeight": "60px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "22px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-container-low min-h-screen flex flex-col items-center justify-center font-body-lg text-on-surface antialiased">
<div class="w-full max-w-[440px] px-margin-mobile md:px-0 z-10 relative">
<!-- Logo Header -->
<div class="flex flex-col items-center justify-center mb-12">
<div class="w-14 h-14 bg-primary rounded-xl flex items-center justify-center mb-stack-sm shadow-md transition-transform hover:scale-105 duration-300">
<span class="material-symbols-outlined text-on-primary text-[32px]" data-icon="schedule" data-weight="fill" style="font-variation-settings: 'FILL' 1;">schedule</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">ChronosHR</h1>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-outline-variant/10 p-10 md:p-12 w-full">
<div class="mb-10 text-center">
<h2 class="font-title-md text-title-md text-on-surface mb-2">Welcome back</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant/80">Please enter your details to sign in</p>
</div>
<form class="space-y-6">
<!-- Email/Phone Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="email">Email or Phone</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-primary text-outline/60">
<span class="material-symbols-outlined text-[20px]" data-icon="person">person</span>
</div>
<input class="input-focus-ring w-full bg-surface-container-low/50 border border-outline-variant/30 focus:bg-white focus:border-primary focus:ring-0 rounded-lg pl-11 pr-4 py-3 font-body-sm text-body-sm text-on-surface transition-all duration-200 placeholder:text-outline/40" id="email" name="email" placeholder="name@company.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-primary text-outline/60">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="input-focus-ring w-full bg-surface-container-low/50 border border-outline-variant/30 focus:bg-white focus:border-primary focus:ring-0 rounded-lg pl-11 pr-12 py-3 font-body-sm text-body-sm text-on-surface transition-all duration-200 placeholder:text-outline/40" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline/60 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between pt-1">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary/20 border-outline-variant/50 rounded bg-surface-container-low cursor-pointer transition-all" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2.5 block font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none" for="remember-me">
                            Keep me logged in
                        </label>
</div>
<div class="text-sm">
<a class="font-body-sm text-body-sm text-primary hover:text-primary-container font-medium transition-colors" href="#">Forgot password?</a>
</div>
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm font-label-caps text-label-caps text-on-primary bg-primary hover:bg-primary/90 focus:outline-none focus:ring-4 focus:ring-primary/10 active:scale-[0.98] transition-all duration-200" type="submit">
                        LOG IN TO ACCOUNT
                    </button>
</div>
</form>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute top-[10%] left-[15%] w-[400px] h-[400px] rounded-full bg-primary/5 blur-[80px]"></div>
<div class="absolute bottom-[10%] right-[15%] w-[500px] h-[500px] rounded-full bg-primary/5 blur-[100px]"></div>
</div>
<!-- Footer -->
<footer class="fixed bottom-0 w-full bg-transparent py-8 px-margin-desktop z-10">
<div class="max-w-container-max-width mx-auto flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0 opacity-60 hover:opacity-100 transition-opacity duration-300">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                © 2024 ChronosHR Enterprise.
            </p>
<div class="flex space-x-8">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Terms</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Security</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Support</a>
</div>
</div>
</footer>
</body></html>
