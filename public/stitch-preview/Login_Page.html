<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - ChronosHR</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@100..900&amp;family=JetBrains+Mono:wght@100..900&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined', sans-serif;
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#653e00",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#00714d",
                        "secondary-fixed-dim": "#4edea3",
                        "outline-variant": "#c7c4d8",
                        "on-primary-container": "#dad7ff",
                        "on-surface-variant": "#464555",
                        "inverse-primary": "#c3c0ff",
                        "surface-container-low": "#eff4ff",
                        "primary-fixed-dim": "#c3c0ff",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#ffd4a4",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#dce9ff",
                        "tertiary": "#684000",
                        "on-secondary-fixed-variant": "#005236",
                        "surface-container-highest": "#d5e3fc",
                        "primary-fixed": "#e2dfff",
                        "on-surface": "#0d1c2e",
                        "background": "#f8f9ff",
                        "surface-tint": "#4d44e3",
                        "on-tertiary-fixed": "#2a1700",
                        "tertiary-container": "#885500",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#ffddb8",
                        "secondary-container": "#6cf8bb",
                        "outline": "#777587",
                        "inverse-surface": "#233144",
                        "surface": "#f8f9ff",
                        "on-primary-fixed": "#0f0069",
                        "on-secondary-fixed": "#002113",
                        "tertiary-fixed-dim": "#ffb95f",
                        "primary-container": "#4f46e5",
                        "on-error": "#ffffff",
                        "on-primary-fixed-variant": "#3323cc",
                        "primary": "#3525cd",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-variant": "#d5e3fc",
                        "surface-dim": "#ccdbf3",
                        "secondary-fixed": "#6ffbbe",
                        "surface-container": "#e6eeff",
                        "surface-bright": "#f8f9ff",
                        "on-background": "#0d1c2e",
                        "secondary": "#006c49",
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "24px",
                        "margin-mobile": "16px",
                        "container-max-width": "1440px",
                        "margin-desktop": "40px",
                        "unit": "4px",
                        "gutter": "24px",
                        "stack-sm": "8px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "title-md": ["Hanken Grotesk"],
                        "label-md": ["JetBrains Mono"],
                        "label-caps": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "body-sm": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "title-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "label-caps": ["11px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-surface-container-low to-surface-bright min-h-screen flex flex-col items-center justify-center font-body-lg text-on-surface">
<div class="w-full max-w-md px-margin-mobile md:px-0 z-10 relative">
<!-- Logo Header -->
<div class="flex flex-col items-center justify-center mb-stack-lg">
<div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center mb-stack-sm shadow-sm">
<span class="material-symbols-outlined text-on-primary" data-icon="schedule" data-weight="fill" style="font-variation-settings: 'FILL' 1;">schedule</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary">ChronosHR</h1>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-lg shadow-sm border border-outline-variant/30 p-stack-lg md:p-[32px] w-full relative overflow-hidden">
<div class="mb-stack-lg text-center">
<h2 class="font-title-md text-title-md text-on-surface mb-unit">Welcome Back</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Login to your account to continue</p>
</div>
<form class="space-y-stack-md">
<!-- Email/Phone Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-unit" for="email">Email or Phone</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="person">person</span>
</div>
<input class="w-full bg-[#F1F5F9] border-transparent focus:bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary rounded-lg pl-10 py-2 font-body-sm text-body-sm text-on-surface transition-colors duration-200" id="email" name="email" placeholder="Enter your email or phone" type="text"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-unit" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full bg-[#F1F5F9] border-transparent focus:bg-surface-container-lowest focus:border-primary focus:ring-1 focus:ring-primary rounded-lg pl-10 pr-10 py-2 font-body-sm text-body-sm text-on-surface transition-colors duration-200" id="password" name="password" placeholder="Enter your password" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between pt-unit">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded bg-[#F1F5F9]" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">
                            Remember Me
                        </label>
</div>
<div class="text-sm">
<a class="font-body-sm text-body-sm text-primary hover:text-primary-fixed-variant transition-colors underline" href="#">Forgot Password?</a>
</div>
</div>
<!-- Submit Button -->
<div class="pt-stack-sm">
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm font-label-caps text-label-caps text-on-primary bg-primary hover:bg-surface-tint focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" type="submit">
                        Login
                    </button>
</div>
</form>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute -top-[20%] -right-[10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[100px]"></div>
<div class="absolute -bottom-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-secondary-fixed/5 blur-[120px]"></div>
</div>
<!-- Footer -->
<footer class="fixed bottom-0 w-full bg-surface-container-lowest dark:bg-inverse-surface py-stack-md px-margin-desktop z-10 border-t border-outline-variant/20">
<div class="max-w-container-max-width mx-auto flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
<p class="font-body-sm text-body-sm text-secondary dark:text-secondary-fixed-dim">
                © 2024 ChronosHR Enterprise. All rights reserved.
            </p>
<div class="flex space-x-6">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Security</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Status</a>
</div>
</div>
</footer>
</body></html>
